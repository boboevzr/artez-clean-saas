<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Выбор локации</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,system-ui,sans-serif; background:#f2f2f7; overflow:hidden; }
#map { position:fixed; top:0; left:0; right:0; bottom:120px; }
#bottom {
  position:fixed; bottom:0; left:0; right:0;
  background:#fff; border-top:1px solid #e5e5ea;
  padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  z-index:1000;
}
#addrBox {
  font-size:14px; color:#333; line-height:1.4;
  min-height:20px; margin-bottom:10px;
}
#addrLabel { font-size:11px; color:#8e8e93; margin-bottom:3px; }
#locateBtn {
  width:100%; padding:10px; background:#f2f2f7; color:#333;
  border:1px solid #d1d1d6; border-radius:10px; font-size:15px; font-weight:500;
  cursor:pointer; margin-bottom:8px; transition:opacity .15s;
}
#locateBtn:active { opacity:.7; }
#confirmBtn {
  width:100%; padding:14px; background:#007aff; color:#fff;
  border:none; border-radius:12px; font-size:17px; font-weight:600;
  cursor:pointer; transition:opacity .15s;
}
#confirmBtn:active { opacity:.8; }
#confirmBtn:disabled { background:#aeaeb2; }
.map-hint {
  position:fixed; top:12px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,.58); color:#fff; font-size:12px;
  padding:5px 14px; border-radius:20px; z-index:999;
  white-space:nowrap; pointer-events:none;
}
</style>
</head>
<body>

<div id="map"></div>
<div class="map-hint">Перетащите метку на нужное место</div>

<div id="bottom">
  <div id="addrLabel">Адрес</div>
  <div id="addrBox">⏳ Определяем местоположение…</div>
  <button id="locateBtn" onclick="locateMe()">📍 Определить моё место</button>
  <button id="confirmBtn" disabled>✅ Подтвердить</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// Навои по умолчанию
let lat = 41.0011, lon = 65.3792;
let resolvedAddr = '';

const map = L.map('map', { zoomControl: true }).setView([lat, lon], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OSM', maxZoom: 19
}).addTo(map);

const marker = L.marker([lat, lon], { draggable: true }).addTo(map);

function buildAddress(d) {
  const a = d.address || {};
  const street  = a.road || a.pedestrian || a.footway || a.path
                || a.neighbourhood || a.quarter || a.residential || '';
  const house   = a.house_number || '';
  const street_h = [street, house].filter(Boolean).join(', ');
  const district = a.city_district || a.suburb || a.village_district || '';
  const city     = a.city || a.town || a.village || a.municipality || '';
  const region   = a.state || a.county || '';
  const parts    = [street_h, district, city, region].filter(Boolean);
  if (parts.length >= 2) return parts.join(', ');
  const dn = (d.display_name || '').split(',').map(s => s.trim()).filter(Boolean);
  return dn.filter(p => !['Узбекистан','Uzbekistan','O\'zbekiston'].includes(p)).slice(0, 5).join(', ');
}

async function reverseGeocode(la, lo) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${la}&lon=${lo}&format=json&accept-language=ru&zoom=18`,
      { headers: { 'User-Agent': 'ARTEZ-Bot/1.0' } }
    );
    return buildAddress(await r.json());
  } catch { return ''; }
}

async function updateLocation(la, lo) {
  lat = la; lon = lo;
  document.getElementById('addrBox').textContent = '⏳ Определяем адрес…';
  document.getElementById('confirmBtn').disabled = true;
  const addr = await reverseGeocode(la, lo);
  resolvedAddr = addr;
  document.getElementById('addrBox').textContent = addr || `${la.toFixed(5)}, ${lo.toFixed(5)}`;
  document.getElementById('confirmBtn').disabled = false;
}

marker.on('dragend', () => {
  const p = marker.getLatLng();
  updateLocation(p.lat, p.lng);
});

function locateMe() {
  if (!navigator.geolocation) return;
  const btn = document.getElementById('locateBtn');
  btn.textContent = '⏳ Определяем…';
  btn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    pos => {
      const la = pos.coords.latitude, lo = pos.coords.longitude;
      map.setView([la, lo], 16);
      marker.setLatLng([la, lo]);
      updateLocation(la, lo);
      btn.textContent = '📍 Определить моё место';
      btn.disabled = false;
    },
    () => {
      btn.textContent = '📍 Определить моё место';
      btn.disabled = false;
    },
    { timeout: 8000, enableHighAccuracy: true }
  );
}

// Попытка GPS при открытии
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    pos => {
      const la = pos.coords.latitude, lo = pos.coords.longitude;
      map.setView([la, lo], 16);
      marker.setLatLng([la, lo]);
      updateLocation(la, lo);
    },
    () => updateLocation(lat, lon),
    { timeout: 8000, enableHighAccuracy: true }
  );
} else {
  updateLocation(lat, lon);
}

document.getElementById('confirmBtn').addEventListener('click', () => {
  const payload = JSON.stringify({
    lat: parseFloat(lat.toFixed(6)),
    lon: parseFloat(lon.toFixed(6)),
    address: resolvedAddr
  });
  tg.sendData(payload);
});
</script>
</body>
</html>
