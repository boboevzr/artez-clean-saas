<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARTEZ SaaS — Superadmin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
    --border: #2e3347; --text: #e8eaf0; --text2: #8b91a8;
    --accent: #f5a623; --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
  }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  /* LOGIN */
  #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 360px; }
  .login-card h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .login-card p { color: var(--text2); margin-bottom: 24px; font-size: 13px; }
  .login-card input { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; margin-bottom: 12px; outline: none; }
  .login-card input:focus { border-color: var(--accent); }
  .err { color: var(--red); font-size: 13px; min-height: 18px; margin-bottom: 8px; }

  /* MAIN */
  #mainScreen { display: none; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 16px; }
  .topbar h1 { font-size: 16px; font-weight: 700; flex: 1; }
  .content { max-width: 960px; margin: 0 auto; padding: 24px; }

  /* BUTTONS */
  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-logout { background: transparent; color: var(--text2); border: 1px solid var(--border); }

  /* SECTION */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-header h2 { font-size: 16px; font-weight: 700; }

  /* TABLE */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text2); border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-green { background: #16a34a22; color: var(--green); }
  .badge-red { background: #ef444422; color: var(--red); }
  .badge-blue { background: #3b82f622; color: var(--blue); }
  .mono { font-family: monospace; font-size: 12px; color: var(--text2); }

  /* MODAL */
  .modal-bg { display: none; position: fixed; inset: 0; background: #000a; z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 420px; max-width: 95vw; }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .field input, .field select { width: 100%; padding: 9px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .modal-err { color: var(--red); font-size: 13px; margin-top: 8px; min-height: 18px; }

  /* STAFF LIST */
  .staff-list { margin-top: 8px; }
  .staff-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .staff-item:last-child { border-bottom: none; }

  .empty { text-align: center; padding: 40px; color: var(--text2); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <h1>⚙️ SaaS Superadmin</h1>
    <p>Управление компаниями ARTEZ</p>
    <div class="err" id="loginErr"></div>
    <input type="password" id="secretInput" placeholder="Superadmin secret" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button class="btn btn-primary" style="width:100%;padding:11px" onclick="doLogin()">Войти →</button>
  </div>
</div>

<!-- MAIN -->
<div id="mainScreen">
  <div class="topbar">
    <h1>⚙️ ARTEZ SaaS — Superadmin</h1>
    <button class="btn btn-logout btn-sm" onclick="logout()">Выйти</button>
  </div>
  <div class="content">

    <!-- Companies -->
    <div class="section-header">
      <h2>🏢 Компании</h2>
      <button class="btn btn-primary btn-sm" onclick="openCreateCompany()">+ Новая компания</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Название</th><th>Slug</th><th>План</th><th>Статус</th><th>Действия</th>
          </tr>
        </thead>
        <tbody id="companiesBody">
          <tr><td colspan="6" class="empty">Загрузка…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL: Create company -->
<div class="modal-bg" id="modalCompany">
  <div class="modal">
    <h3>🏢 Новая компания</h3>
    <div class="field"><label>Название</label><input id="co_name" placeholder="ООО Химчистка"></div>
    <div class="field"><label>Slug (латиница, уникальный)</label><input id="co_slug" placeholder="cleanpro"></div>
    <div class="field"><label>План</label>
      <select id="co_plan">
        <option value="starter">Starter</option>
        <option value="basic">Basic</option>
        <option value="pro">Pro</option>
      </select>
    </div>
    <div class="field"><label>Макс. филиалов</label><input id="co_branches" type="number" value="5"></div>
    <div class="field"><label>Макс. сотрудников</label><input id="co_staff" type="number" value="50"></div>
    <div class="modal-err" id="coErr"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modalCompany')">Отмена</button>
      <button class="btn btn-primary" onclick="createCompany()">Создать</button>
    </div>
  </div>
</div>

<!-- MODAL: Company detail (staff) -->
<div class="modal-bg" id="modalDetail">
  <div class="modal" style="width:520px">
    <h3 id="detailTitle">Компания</h3>
    <div style="margin-bottom:16px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:4px">API Key (secret_key)</div>
      <div style="display:flex;gap:8px;align-items:center">
        <code id="detailKey" class="mono" style="flex:1;background:var(--surface2);padding:6px 10px;border-radius:6px;word-break:break-all"></code>
        <button class="btn btn-ghost btn-sm" onclick="regenKey()">🔄</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-weight:700;font-size:13px">👤 Сотрудники</div>
      <button class="btn btn-primary btn-sm" onclick="openCreateStaff()">+ Добавить</button>
    </div>
    <div id="staffList" class="staff-list"></div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn btn-ghost" onclick="closeModal('modalDetail')">Закрыть</button>
    </div>
  </div>
</div>

<!-- MODAL: Create staff -->
<div class="modal-bg" id="modalStaff">
  <div class="modal">
    <h3>👤 Добавить сотрудника</h3>
    <div class="field"><label>Имя</label><input id="st_name" placeholder="Иван"></div>
    <div class="field"><label>Фамилия</label><input id="st_last" placeholder="Иванов"></div>
    <div class="field"><label>Логин</label><input id="st_login" placeholder="ivan_admin"></div>
    <div class="field"><label>Пароль</label><input id="st_pass" type="password" placeholder="мин. 4 символа"></div>
    <div class="field"><label>Роль</label>
      <select id="st_role">
        <option value="admin">admin</option>
        <option value="manager">manager</option>
        <option value="callcenter">callcenter</option>
      </select>
    </div>
    <div class="modal-err" id="stErr"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modalStaff')">Отмена</button>
      <button class="btn btn-primary" onclick="createStaff()">Создать</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
const API = (window.APP_API_URL || 'https://web-production-eef2a.up.railway.app') + '/api';
const LS_KEY = 'saas_superadmin_token';
let _token = localStorage.getItem(LS_KEY) || '';
let _currentCompanyId = null;

// ── AUTH ──────────────────────────────────────────────
async function doLogin() {
  const secret = document.getElementById('secretInput').value.trim();
  document.getElementById('loginErr').textContent = '';
  if (!secret) return;
  try {
    const r = await api('/saas/auth', 'POST', { secret });
    _token = r.token;
    localStorage.setItem(LS_KEY, _token);
    showMain();
  } catch(e) {
    document.getElementById('loginErr').textContent = e.message;
  }
}

function logout() {
  localStorage.removeItem(LS_KEY);
  _token = '';
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

// ── API HELPER ────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (_token) opts.headers['Authorization'] = 'Bearer ' + _token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  const d = await r.json();
  if (!r.ok) throw new Error(d.detail || 'Ошибка ' + r.status);
  return d;
}

// ── MAIN ──────────────────────────────────────────────
async function showMain() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  await loadCompanies();
}

async function loadCompanies() {
  try {
    const d = await api('/saas/companies');
    renderCompanies(d.companies || []);
  } catch(e) {
    document.getElementById('companiesBody').innerHTML =
      `<tr><td colspan="6" class="empty" style="color:var(--red)">${e.message}</td></tr>`;
  }
}

function renderCompanies(list) {
  const tb = document.getElementById('companiesBody');
  if (!list.length) { tb.innerHTML = '<tr><td colspan="6" class="empty">Нет компаний</td></tr>'; return; }
  tb.innerHTML = list.map(c => `
    <tr>
      <td class="mono">${c.id}</td>
      <td style="font-weight:600">${c.name}</td>
      <td class="mono">${c.slug}</td>
      <td><span class="badge badge-blue">${c.plan}</span></td>
      <td>${c.active !== false
        ? '<span class="badge badge-green">Активна</span>'
        : '<span class="badge badge-red">Отключена</span>'}</td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="openDetail(${c.id},'${escHtml(c.name)}')">👥 Сотрудники</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleCompany(${c.id},${c.active !== false})">${c.active !== false ? '⏸ Откл.' : '▶ Вкл.'}</button>
      </td>
    </tr>
  `).join('');
}

// ── CREATE COMPANY ─────────────────────────────────────
function openCreateCompany() {
  ['co_name','co_slug'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('co_plan').value = 'starter';
  document.getElementById('co_branches').value = '5';
  document.getElementById('co_staff').value = '50';
  document.getElementById('coErr').textContent = '';
  openModal('modalCompany');
}

async function createCompany() {
  const name = document.getElementById('co_name').value.trim();
  const slug = document.getElementById('co_slug').value.trim();
  const plan = document.getElementById('co_plan').value;
  const max_branches = parseInt(document.getElementById('co_branches').value) || 5;
  const max_staff    = parseInt(document.getElementById('co_staff').value) || 50;
  document.getElementById('coErr').textContent = '';
  if (!name || !slug) { document.getElementById('coErr').textContent = 'Заполните название и slug'; return; }
  try {
    await api('/saas/companies', 'POST', { name, slug, plan, max_branches, max_staff });
    closeModal('modalCompany');
    await loadCompanies();
  } catch(e) {
    document.getElementById('coErr').textContent = e.message;
  }
}

async function toggleCompany(id, isActive) {
  try {
    await api(`/saas/companies/${id}`, 'PUT', { active: !isActive });
    await loadCompanies();
  } catch(e) { alert(e.message); }
}

// ── DETAIL (staff list) ───────────────────────────────
async function openDetail(companyId, name) {
  _currentCompanyId = companyId;
  document.getElementById('detailTitle').textContent = '🏢 ' + name;
  document.getElementById('detailKey').textContent = 'Загрузка…';
  document.getElementById('staffList').innerHTML = '<div style="color:var(--text2);font-size:13px">Загрузка…</div>';
  openModal('modalDetail');
  try {
    const [cd, sd] = await Promise.all([
      api(`/saas/companies/${companyId}`),
      api(`/saas/companies/${companyId}/staff`)
    ]);
    document.getElementById('detailKey').textContent = cd.company?.secret_key || '—';
    renderStaffList(sd.staff || []);
  } catch(e) {
    document.getElementById('detailKey').textContent = e.message;
  }
}

function renderStaffList(list) {
  const el = document.getElementById('staffList');
  if (!list.length) { el.innerHTML = '<div style="color:var(--text2);font-size:13px;padding:8px 0">Нет сотрудников</div>'; return; }
  el.innerHTML = list.map(s => `
    <div class="staff-item">
      <span style="font-weight:600">${escHtml(s.first_name)} ${escHtml(s.last_name||'')}</span>
      <span class="mono" style="flex:1">${escHtml(s.login)}</span>
      <span class="badge ${s.role==='admin'?'badge-blue':''}">${s.role}</span>
      <span class="badge ${s.active?'badge-green':'badge-red'}">${s.active?'active':'off'}</span>
    </div>
  `).join('');
}

async function regenKey() {
  if (!confirm('Сгенерировать новый ключ? Старый перестанет работать.')) return;
  try {
    const d = await api(`/saas/companies/${_currentCompanyId}/regenerate-key`, 'POST');
    document.getElementById('detailKey').textContent = d.secret_key;
  } catch(e) { alert(e.message); }
}

// ── CREATE STAFF ──────────────────────────────────────
function openCreateStaff() {
  ['st_name','st_last','st_login','st_pass'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('st_role').value = 'admin';
  document.getElementById('stErr').textContent = '';
  openModal('modalStaff');
}

async function createStaff() {
  const first_name = document.getElementById('st_name').value.trim();
  const last_name  = document.getElementById('st_last').value.trim();
  const login      = document.getElementById('st_login').value.trim();
  const password   = document.getElementById('st_pass').value;
  const role       = document.getElementById('st_role').value;
  document.getElementById('stErr').textContent = '';
  if (!first_name || !login || !password) { document.getElementById('stErr').textContent = 'Заполните имя, логин и пароль'; return; }
  if (password.length < 4) { document.getElementById('stErr').textContent = 'Пароль мин. 4 символа'; return; }
  try {
    await api(`/saas/companies/${_currentCompanyId}/staff`, 'POST',
      { first_name, last_name, login, password, role });
    closeModal('modalStaff');
    const sd = await api(`/saas/companies/${_currentCompanyId}/staff`);
    renderStaffList(sd.staff || []);
  } catch(e) {
    document.getElementById('stErr').textContent = e.message;
  }
}

// ── UTILS ─────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function escHtml(s)     { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.querySelectorAll('.modal-bg').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ── INIT ──────────────────────────────────────────────
if (_token) {
  showMain().catch(() => {
    localStorage.removeItem(LS_KEY); _token = '';
  });
}
</script>
</body>
</html>
