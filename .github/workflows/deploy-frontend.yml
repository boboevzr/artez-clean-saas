name: Deploy Frontend to ahost.uz

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      subdomain:
        description: 'Поддомен (пусто = artez.uz, saas-test = saas-test.artez.uz)'
        required: false
        default: ''
      api_url:
        description: 'API URL для этого клиента'
        required: false
        default: 'https://artez-api-production.up.railway.app'
      company_name:
        description: 'Название компании'
        required: false
        default: 'ARTEZ'

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Generate config.js
        run: |
          # При push в main — всегда saas-test со своим API
          if [ "${{ github.event_name }}" = "push" ]; then
            API_URL="https://web-production-eef2a.up.railway.app"
            CO_NAME="ARTEZ"
          else
            API_URL="${{ github.event.inputs.api_url }}"
            CO_NAME="${{ github.event.inputs.company_name }}"
          fi
          printf 'window.APP_COMPANY_NAME = "%s";\nwindow.APP_API_URL      = "%s";\n' \
            "$CO_NAME" "$API_URL" > config.js
          echo "Generated config.js:"
          cat config.js

      - name: Set FTP credentials and path
        id: cfg
        run: |
          # При push в main — всегда saas-test
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "ftp_user=${{ secrets.FTP_USERNAME_SAAS }}" >> $GITHUB_OUTPUT
            echo "ftp_pass=${{ secrets.FTP_PASSWORD_SAAS }}" >> $GITHUB_OUTPUT
            echo "ftp_path=/"                                >> $GITHUB_OUTPUT
          else
            SUB="${{ github.event.inputs.subdomain }}"
            if [ -z "$SUB" ]; then
              echo "ftp_user=${{ secrets.FTP_USERNAME }}"      >> $GITHUB_OUTPUT
              echo "ftp_pass=${{ secrets.FTP_PASSWORD }}"      >> $GITHUB_OUTPUT
              echo "ftp_path=/"                                >> $GITHUB_OUTPUT
            else
              echo "ftp_user=${{ secrets.FTP_USERNAME_SAAS }}" >> $GITHUB_OUTPUT
              echo "ftp_pass=${{ secrets.FTP_PASSWORD_SAAS }}" >> $GITHUB_OUTPUT
              echo "ftp_path=/"                                >> $GITHUB_OUTPUT
            fi
          fi

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ steps.cfg.outputs.ftp_user }}
          FTP_PASS: ${{ steps.cfg.outputs.ftp_pass }}
          DEPLOY_PATH: ${{ steps.cfg.outputs.ftp_path }}
        run: |
          cat > /tmp/deploy.lftp << EOF
          set ftp:ssl-allow no
          set net:timeout 60
          set net:max-retries 3
          mirror --reverse --no-perms --parallel=4 --transfer-all --verbose --exclude-glob=.git/ --exclude-glob=.github/ --exclude-glob=*.md --exclude-glob=.gitignore . ${DEPLOY_PATH}
          put config.js -o ${DEPLOY_PATH}config.js
          bye
          EOF
          echo "=== lftp script ==="
          cat /tmp/deploy.lftp
          echo "=== config.js content ==="
          cat config.js
          lftp -u "$FTP_USER,$FTP_PASS" "$FTP_SERVER" < /tmp/deploy.lftp
