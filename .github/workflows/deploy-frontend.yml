name: Deploy Frontend to ahost.uz

on:
  workflow_dispatch:
    inputs:
      subdomain:
        description: 'Поддомен (пусто = artez.uz, saas-test = saas-test.artez.uz)'
        required: false
        default: ''
      api_url:
        description: 'API URL для этого клиента'
        required: false
        default: 'https://artez-api-production.up.railway.app'
      company_name:
        description: 'Название компании'
        required: false
        default: 'ARTEZ'

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Generate config.js
        run: |
          cat > config.js << EOF
          window.APP_COMPANY_NAME = "${{ github.event.inputs.company_name }}";
          window.APP_API_URL      = "${{ github.event.inputs.api_url }}";
          EOF

      - name: Set FTP credentials and path
        id: cfg
        run: |
          SUB="${{ github.event.inputs.subdomain }}"
          echo "ftp_user=${{ secrets.FTP_USERNAME }}" >> $GITHUB_OUTPUT
          echo "ftp_pass=${{ secrets.FTP_PASSWORD }}" >> $GITHUB_OUTPUT
          if [ -z "$SUB" ]; then
            echo "ftp_path=/"                         >> $GITHUB_OUTPUT
          else
            echo "ftp_path=/${SUB}/"                  >> $GITHUB_OUTPUT
          fi

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ steps.cfg.outputs.ftp_user }}
          FTP_PASS: ${{ steps.cfg.outputs.ftp_pass }}
          DEPLOY_PATH: ${{ steps.cfg.outputs.ftp_path }}
        run: |
          lftp -u "$FTP_USER,$FTP_PASS" "$FTP_SERVER" -e "
            set ftp:ssl-allow no;
            set net:timeout 60;
            set net:max-retries 3;
            mirror --reverse --no-perms --parallel=4 --ignore-time --verbose \
              --exclude-glob=.git \
              --exclude-glob=.github \
              --exclude-glob=*.md \
              --exclude-glob=.gitignore \
              . $DEPLOY_PATH;
            put -O $DEPLOY_PATH config.js;
            bye"
